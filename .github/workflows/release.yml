name: Release durable Pi patch

on:
  workflow_dispatch:
  push:
    tags:
      - "pi-v*-patch.*"

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      release-id: ${{ steps.release-input.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Read and validate the release candidate input
        id: release-input
        shell: bash
        run: |
          release_id=$(node -p '`pi-v${JSON.parse(require("fs").readFileSync("package.json", "utf8")).version}`')
          pi_version=$(node -p 'JSON.parse(require("fs").readFileSync(`releases/${process.argv[1]}/manifest.json`, "utf8")).upstream.packageVersion' "$release_id")
          published_at=$(git show -s --format=%cI "$GITHUB_SHA" | node -e 'process.stdin.once("data", value => console.log(new Date(value.toString().trim()).toISOString()))')
          echo "RELEASE_ID=$release_id" >> "$GITHUB_ENV"
          echo "PI_VERSION=$pi_version" >> "$GITHUB_ENV"
          echo "RELEASE_PUBLISHED_AT=$published_at" >> "$GITHUB_ENV"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            [[ "$GITHUB_REF_NAME" == "$release_id" ]] || {
              echo "Tag $GITHUB_REF_NAME does not match release candidate input $release_id" >&2
              exit 1
            }
            git fetch origin main
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
              echo "Release tag must point to a commit on main" >&2
              exit 1
            }
          fi

      - name: Run the complete release-candidate gate
        run: node scripts/release-gate.mjs

      - name: Build precompiled Pi binaries
        shell: bash
        run: |
          .work/pi-v0.81.1/scripts/build-binaries.sh \
            --skip-install \
            --skip-build \
            --out "$GITHUB_WORKSPACE/.work/upstream-binaries"
          node scripts/package-binaries.mjs \
            --input .work/upstream-binaries \
            --output .work/release-binaries

      - name: Smoke-test the precompiled release
        shell: bash
        run: |
          smoke_root=$(mktemp -d)
          trap 'rm -rf "$smoke_root"' EXIT
          tar -xzf .work/release-binaries/pi-wait-for-user-linux-x64.tar.gz -C "$smoke_root"
          export HOME="$smoke_root/home"
          export PI_CODING_AGENT_DIR="$HOME/.pi/agent"
          test "$("$smoke_root/pi-wait-for-user/pi-wait-for-user" --version)" = "$PI_VERSION"
          "$smoke_root/pi-wait-for-user/pi-wait-for-user" conformance | grep 'Deferred conformance passed (8/8)'
          "$smoke_root/pi-wait-for-user/pi-wait-for-user" --list-models >/dev/null
          test -f "$smoke_root/pi-wait-for-user/question-tool/extensions/question-tool.ts"
          set +e
          printf '/quit\n' | timeout 20s script -q -c "$smoke_root/pi-wait-for-user/pi-wait-for-user" "$smoke_root/session.log" >/dev/null
          set -e
          grep -a 'question-tool.ts' "$smoke_root/session.log"

      - name: Build immutable payload assets
        run: node scripts/release.mjs bundle "dist/$RELEASE_ID" .work/release-binaries

      - name: Attest payload provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ env.RELEASE_ID }}/*

      - name: Verify every payload's GitHub provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          request="dist/$RELEASE_ID/.release-metadata/provenance-request.json"
          node -e 'for (const artifact of JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).artifacts) console.log(artifact.name)' "$request" |
          while IFS= read -r artifact; do
            gh attestation verify "dist/$RELEASE_ID/$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-digest "$GITHUB_SHA"
          done
          cp "$request" "dist/$RELEASE_ID/.release-metadata/provenance-verified.json"

      - name: Upload unsigned release candidate
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ env.RELEASE_ID }}
          path: dist/${{ env.RELEASE_ID }}/
          include-hidden-files: true
          if-no-files-found: error

  production-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-release
    concurrency:
      group: production-release-channel
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_ID: ${{ needs.release-candidate.outputs.release-id }}
      RELEASE_SIGNING_KEY_ID: ${{ vars.RELEASE_SIGNING_KEY_ID }}
      RELEASE_CHANNEL_SEQUENCE: ${{ vars.RELEASE_CHANNEL_SEQUENCE }}
      RELEASE_CHANNEL_EXPIRES: ${{ vars.RELEASE_CHANNEL_EXPIRES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Download the verified release candidate
        uses: actions/download-artifact@v4
        with:
          name: unsigned-${{ env.RELEASE_ID }}
          path: dist/${{ env.RELEASE_ID }}

      - name: Validate production trust and promotion policy
        shell: bash
        run: |
          test -f releases/release-trust.json || { echo "Production release trust is not provisioned" >&2; exit 1; }
          test -f releases/root-public-key.pem || { echo "Production root public key is not provisioned" >&2; exit 1; }
          test -f releases/root-public-key.sha256 || { echo "Production root fingerprint is not provisioned" >&2; exit 1; }
          test -n "$RELEASE_SIGNING_KEY_ID"
          test -n "$RELEASE_CHANNEL_SEQUENCE"
          test -n "$RELEASE_CHANNEL_EXPIRES"
          root_key_id=$(node -p 'JSON.parse(require("fs").readFileSync("releases/signing-policy.json", "utf8")).initialKeyIds.root')
          channel_url=$(node -p 'JSON.parse(require("fs").readFileSync("releases/signing-policy.json", "utf8")).stableUrls.channel')
          trust_channel_url=$(node -p 'JSON.parse(require("fs").readFileSync("releases/release-trust.json", "utf8")).signed.channelUrl')
          test "$channel_url" = "$trust_channel_url"
          actual_fingerprint=$(node scripts/release-metadata.mjs fingerprint --public-key releases/root-public-key.pem)
          expected_fingerprint=$(tr -d '[:space:]' < releases/root-public-key.sha256)
          test "$actual_fingerprint" = "$expected_fingerprint"
          echo "RELEASE_ROOT_KEY_ID=$root_key_id" >> "$GITHUB_ENV"
          node -e '
            const expires = Date.parse(process.env.RELEASE_CHANNEL_EXPIRES);
            const remaining = expires - Date.now();
            if (!Number.isFinite(expires) || remaining < 59 * 86400000 || remaining > 61 * 86400000) {
              throw new Error("RELEASE_CHANNEL_EXPIRES must be approximately 60 days in the future");
            }
          '

      - name: Sign the complete Release Manifest and Channel
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          test -n "$RELEASE_SIGNING_PRIVATE_KEY"
          key_dir=$(mktemp -d)
          trap 'rm -rf "$key_dir"' EXIT
          printf '%s' "$RELEASE_SIGNING_PRIVATE_KEY" > "$key_dir/release-private.pem"
          chmod 600 "$key_dir/release-private.pem"
          metadata="dist/$RELEASE_ID/.release-metadata"
          manifest="dist/$RELEASE_ID/release-manifest.json"
          common=(--trust releases/release-trust.json --root-key "$RELEASE_ROOT_KEY_ID=releases/root-public-key.pem")
          if test -f releases/trust-state.json; then
            common+=(--accepted-trust-state releases/trust-state.json)
          fi
          node scripts/release-metadata.mjs sign-manifest \
            --input "$metadata/unsigned-manifest.json" \
            --provenance "$metadata/provenance-verified.json" \
            "${common[@]}" \
            --key-id "$RELEASE_SIGNING_KEY_ID" \
            --private-key "$key_dir/release-private.pem" \
            --release-root "$GITHUB_WORKSPACE" \
            --output "$manifest"
          if test -f releases/channel-state.json; then
            promotion_state=(--accepted-state releases/channel-state.json)
          else
            promotion_state=(--bootstrap true)
          fi
          node scripts/release-metadata.mjs promote \
            --manifest "$manifest" \
            "${common[@]}" \
            --key-id "$RELEASE_SIGNING_KEY_ID" \
            --private-key "$key_dir/release-private.pem" \
            --sequence "$RELEASE_CHANNEL_SEQUENCE" \
            --expires "$RELEASE_CHANNEL_EXPIRES" \
            --manifest-url "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_ID/release-manifest.json" \
            "${promotion_state[@]}" \
            --output "dist/$RELEASE_ID"

      - name: Attest generated release metadata
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ env.RELEASE_ID }}/*

      - name: Verify every publishable artifact's provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          find "dist/$RELEASE_ID" -maxdepth 1 -type f -print0 |
          while IFS= read -r -d '' artifact; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-digest "$GITHUB_SHA"
          done

      - name: Upload signed release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ID }}
          path: dist/${{ env.RELEASE_ID }}/*
          if-no-files-found: error

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to replace it" >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            dist/"$GITHUB_REF_NAME"/* \
            --verify-tag \
            --title "Pi Wait for User · $GITHUB_REF_NAME" \
            --notes-file "releases/$GITHUB_REF_NAME/RELEASE_NOTES.md"

      - name: Stage the atomic stable-Channel promotion branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="release-promotion/$RELEASE_ID-sequence-$RELEASE_CHANNEL_SEQUENCE"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Promotion branch already exists: $branch" >&2
            exit 1
          fi
          git fetch origin main
          git switch --create "$branch" origin/main
          cp "dist/$RELEASE_ID/channel.json" releases/channel.json
          cp "dist/$RELEASE_ID/channel-state.json" releases/channel-state.json
          cp "dist/$RELEASE_ID/trust-state.json" releases/trust-state.json
          git add releases/channel.json releases/channel-state.json releases/trust-state.json
          git diff --cached --quiet && { echo "Promotion does not change stable Channel state" >&2; exit 1; }
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "release: promote $RELEASE_ID at channel sequence $RELEASE_CHANNEL_SEQUENCE"
          git push origin "$branch"
          {
            echo "## Stable Channel promotion is ready"
            echo
            echo "Immutable release: \`$RELEASE_ID\`"
            echo "Promotion branch: \`$branch\`"
            echo
            echo "A maintainer or authorized agent must independently verify the public release, open the promotion PR, run the two-axis review and CI gate, and merge only with explicit user authorization."
            echo
            echo "\`gh pr create --base main --head $branch --title 'release: promote $RELEASE_ID' --body-file <prepared-public-body.md>\`"
          } >> "$GITHUB_STEP_SUMMARY"
